<!-- Top navigation -->
<nav class="topbar">
  <a routerLink="/" class="topbar-brand">RentIt</a>

  <div class="topbar-actions">
    <button
      type="button"
      class="theme-toggle"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Skift til lyst tema' : 'Skift til mørkt tema'"
    >
      {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
    </button>
    <a routerLink="/login" class="btn btn-outline">Log ind</a>
    <a routerLink="/register" class="btn btn-primary">Tilmeld</a>
  </div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-card">
    <h1>Lej Værktøj Nær Dig</h1>
    <p>Del hvad du har. Lej hvad du behøver.</p>
    <div class="hero-actions">
      <a routerLink="/login" class="btn btn-primary">Gennemse</a>
      <a routerLink="/register" class="btn btn-outline">Opret konto</a>
    </div>
  </div>
</section>

<!-- How it works -->
<section class="how-it-works">
  <h2>Sådan Fungerer Det</h2>
  <div class="steps">
    <div *ngFor="let step of steps" class="step">
      <div class="step-icon">{{ step.icon }}</div>
      <p class="step-label">{{ step.number }}. {{ step.title }}</p>
    </div>
  </div>
</section>

<!-- Categories -->
<section class="categories">
  <div class="category-card" *ngFor="let cat of categories">
    <div class="category-icon">{{ cat.icon }}</div>
    <p>{{ cat.name }}</p>
  </div>
</section>
