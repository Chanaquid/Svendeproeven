<div class="fixed inset-0 bg-zinc-950 -z-10"></div>
<div class="fixed inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:52px_52px] -z-10"></div>

<app-navbar></app-navbar>

<main class="pt-16 min-h-screen">
  <div class="px-6 md:px-10 pt-8 pb-6 border-b border-zinc-800/60">
    <h1 class="font-black text-2xl md:text-3xl text-white tracking-tight" style="font-family:'Syne',sans-serif">
      Resolution Center
    </h1>
    <p class="text-zinc-500 text-sm mt-1">Manage your disputes, fines, appeals, identity verifications and reports.</p>
  </div>

  <!-- Tabs -->
  <div class="px-6 md:px-10 pt-6">
    <div class="flex gap-2 border-b border-zinc-800">
      <button
        *ngFor="let tab of tabs"
        (click)="setTab(tab.key)"
        class="flex items-center gap-2 px-4 py-2.5 text-sm font-semibold transition-all duration-200 border-b-2 -mb-px cursor-pointer"
        [class.border-amber-400]="activeTab === tab.key"
        [class.text-white]="activeTab === tab.key"
        [class.border-transparent]="activeTab !== tab.key"
        [class.text-zinc-500]="activeTab !== tab.key"
        [class.hover:text-zinc-300]="activeTab !== tab.key">
        <span>{{ tab.icon }}</span>
        {{ tab.label }}
      </button>
    </div>
  </div>

  <!-- Tab content -->
  <div class="px-6 md:px-10 py-8">
    <app-dispute  *ngIf="activeTab === 'disputes'" [openDisputeId]="selectedDisputeId"></app-dispute>
    <app-fine *ngIf="activeTab === 'fines'" [openFineId]="selectedFineId"></app-fine>
    <app-appeal  *ngIf="activeTab === 'appeals'" [openAppealId]="selectedAppealId"></app-appeal>
    <app-verification-request *ngIf="activeTab === 'verification'"  [openVerificationId]="selectedVerificationId"></app-verification-request>
    <app-report *ngIf="activeTab === 'reports'" [openReportId]="selectedReportId"></app-report>
  </div>
</main>
