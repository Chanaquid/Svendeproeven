<!-- Background -->
<div class="fixed inset-0 bg-zinc-950 -z-10"></div>
<div
    class="fixed inset-0 bg-[linear-gradient(rgba(255,255,255,0.02)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.02)_1px,transparent_1px)] bg-[size:52px_52px] -z-10">
</div>

<app-navbar></app-navbar>

<main class="pt-16 min-h-screen">

    <!-- Header -->
    <div class="px-6 md:px-10 pt-10 pb-8 border-b border-zinc-800/60">
        <div class="flex items-center gap-4 mb-1">
            <div
                class="w-10 h-10 bg-amber-400/10 border border-amber-400/20 rounded-xl flex items-center justify-center shrink-0">
                <svg class="w-5 h-5 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                    stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />
                </svg>
            </div>
            <div>
                <h1 class="font-black text-2xl md:text-3xl text-white tracking-tight"
                    style="font-family:'Syne',sans-serif">
                    Resolution Centre
                </h1>
                <p class="text-zinc-500 text-sm">Manage your disputes, appeals and identity verification</p>
            </div>
        </div>
    </div>

    <div class="px-6 md:px-10 py-8">

        <!-- Tabs -->
        <div class="flex items-center gap-1 bg-zinc-900 border border-zinc-800 rounded-2xl p-1 mb-8 w-fit">
            <button *ngFor="let tab of tabs" (click)="activeTab = tab.key; onTabChange()"
                class="flex items-center gap-2 px-4 py-2 text-xs font-semibold rounded-xl transition-all duration-200 cursor-pointer"
                [class.bg-amber-400]="activeTab === tab.key" [class.text-zinc-900]="activeTab === tab.key"
                [class.text-zinc-200]="activeTab !== tab.key" [class.hover:text-white]="activeTab !== tab.key">
                <span>{{ tab.icon }}</span>
                {{ tab.label }}
                <span *ngIf="tab.count !== null" class="text-[10px] font-bold px-1.5 py-0.5 rounded-full"
                    [class.bg-zinc-900]="activeTab === tab.key" [class.text-zinc-200]="activeTab === tab.key"
                    [class.bg-zinc-800]="activeTab !== tab.key" [class.text-zinc-500]="activeTab !== tab.key">
                    {{ tab.count }}
                </span>
            </button>
        </div>

        <div *ngIf="activeTab === 'disputes'">
            <app-dispute></app-dispute>
        </div>

    </div>
</main>
