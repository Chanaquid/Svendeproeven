<nav class="navbar">

  <!-- Brand -->
  <a routerLink="/home" class="brand">RentIt</a>

  <!-- Right actions -->
  <div class="actions">

    <!-- Messages shortcut -->
    <a
      class="action-link"
      (click)="router.navigate(['/my-chats']); showUserMenu = false"
    >
      Beskeder
    </a>

    <!-- Theme toggle -->
    <button
      type="button"
      class="theme-toggle"
      (click)="theme.toggle()"
      [attr.aria-label]="theme.theme() === 'dark' ? 'Skift til lyst tema' : 'Skift til mørkt tema'"
    >
      {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
    </button>

    <!-- Notifications -->
    <div class="dropdown-wrap">
      <button
        class="icon-btn"
        (click)="showNotifications = !showNotifications; showUserMenu = false"
        aria-label="Notifikationer"
      >
        🔔
        <span *ngIf="unreadCount > 0" class="icon-badge">{{ unreadCount }}</span>
      </button>

      <div *ngIf="showNotifications" class="dropdown dropdown--notifications">
        <header class="dropdown-header">
          <h3>Notifikationer</h3>
          <button
            *ngIf="unreadCount > 0"
            (click)="markAllAsRead()"
            class="dropdown-action"
          >
            Markér alle som læst
          </button>
        </header>

        <div class="notif-list">
          <p *ngIf="notifications.length === 0" class="notif-empty">
            Ingen notifikationer
          </p>

          <button
            *ngFor="let n of notifications"
            (click)="onNotificationClick(n)"
            class="notif-item"
            [class.notif-item--unread]="!n.isRead"
          >
            <span class="notif-icon">{{ getNotificationIcon(n.type) }}</span>
            <span class="notif-body">
              <span class="notif-message">{{ n.message }}</span>
              <span class="notif-time">{{ n.createdAt | date:'d MMM, HH:mm' }}</span>
            </span>
            <span *ngIf="!n.isRead" class="notif-dot" aria-hidden="true"></span>
          </button>
        </div>

        <footer *ngIf="notifications.length > 0" class="dropdown-footer">
          <a
            routerLink="/notifications"
            (click)="showNotifications = false"
          >
            Se alle notifikationer
          </a>
        </footer>
      </div>
    </div>

    <!-- User menu -->
    <div class="dropdown-wrap">
      <button
        class="user-btn"
        (click)="showUserMenu = !showUserMenu; showNotifications = false"
      >
        <span class="avatar">
          <img *ngIf="userAvatarUrl" [src]="userAvatarUrl" [alt]="userName" />
          <span *ngIf="!userAvatarUrl" class="avatar-initials">{{ userInitials }}</span>
        </span>
        <span class="user-name">{{ userName }}</span>
        <span class="chevron" aria-hidden="true">▾</span>
      </button>

      <div *ngIf="showUserMenu" class="dropdown dropdown--user">
        <div class="user-info">
          <p class="user-info-name">{{ userName }}</p>
          <p class="user-info-email">{{ userEmail }}</p>
        </div>

        <!-- Menu items generated from navbar.ts `menuItems` array -->
        <div class="menu-group">
          <ng-container *ngFor="let item of menuItems">
            <ng-container *ngIf="!item.adminOnly || isAdmin">
              <!-- Static route -->
              <a
                *ngIf="item.link; else actionItem"
                class="menu-item"
                [class.menu-item--accent]="item.adminOnly"
                [routerLink]="item.link"
                (click)="onMenuItemClick(item)"
              >
                {{ item.label }}
              </a>

              <!-- Action (dynamic navigation) -->
              <ng-template #actionItem>
                <a
                  class="menu-item"
                  (click)="onMenuItemClick(item)"
                >
                  {{ item.label }}
                </a>
              </ng-template>
            </ng-container>
          </ng-container>
        </div>

        <div class="menu-group menu-group--bordered">
          <button
            class="menu-item menu-item--danger"
            (click)="logout()"
          >
            Log ud
          </button>
        </div>
      </div>
    </div>
  </div>
</nav>
