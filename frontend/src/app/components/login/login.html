<div class="auth-page">

  <!-- Top bar -->
  <nav class="topbar">
    <a routerLink="/" class="topbar-brand">RentIt</a>
    <div class="topbar-actions">
      <button
        type="button"
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Skift til lyst tema' : 'Skift til mørkt tema'"
      >
        {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    </div>
  </nav>

  <!-- Login card -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Velkommen Tilbage</h1>
      <p class="subtitle">Log ind på din konto</p>

      <form (ngSubmit)="login()" #loginForm="ngForm" class="form">

        <!-- Email -->
        <div class="field">
          <label for="email">E-mail</label>
          <input
            id="email"
            type="email"
            name="email"
            [(ngModel)]="email"
            required
            placeholder="anders@example.dk"
          />
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Adgangskode</label>
          <div class="password-wrapper">
            <input
              id="password"
              [type]="showPassword ? 'text' : 'password'"
              name="password"
              [(ngModel)]="password"
              required
              placeholder="••••••••"
            />
            <button
              type="button"
              class="toggle-btn"
              (click)="togglePassword()"
              [attr.aria-label]="showPassword ? 'Skjul adgangskode' : 'Vis adgangskode'"
            >
              {{ showPassword ? 'Skjul' : 'Vis' }}
            </button>
          </div>
        </div>

        <!-- Forgot password -->
        <a href="#" class="forgot-link">Glemt adgangskode?</a>

        <!-- Error -->
        <p *ngIf="errorMessage" class="form-error">{{ errorMessage }}</p>

        <!-- Submit -->
        <button
          type="submit"
          class="btn btn-primary submit-btn"
          [disabled]="loginForm.invalid || isLoading"
        >
          {{ isLoading ? 'Logger ind...' : 'Log Ind' }}
        </button>
      </form>

      <p class="auth-footer">
        Har du ikke en konto?
        <a routerLink="/register">Tilmeld</a>
      </p>
    </div>
  </div>
</div>
