<div class="confirm-page">
  <!-- Top bar -->
  <nav class="topbar">
    <a routerLink="/" class="topbar-brand">RentIt</a>
    <div class="topbar-actions">
      <button
        type="button"
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="
          theme.theme() === 'dark' ? 'Skift til lyst tema' : 'Skift til mørkt tema'
        "
      >
        {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    </div>
  </nav>

  <!-- Content -->
  <main class="confirm-wrapper">
    <!-- Loading -->
    <div *ngIf="status === 'loading'" class="confirm-card">
      <div class="spinner" aria-hidden="true"></div>
      <h1>Bekræfter din e-mail...</h1>
      <p>Vent venligst mens vi bekræfter din konto.</p>
    </div>

    <!-- Success -->
    <div *ngIf="status === 'success'" class="confirm-card">
      <div class="status-icon status-icon--success" aria-hidden="true">✓</div>
      <p class="eyebrow">E-mail bekræftet</p>
      <h1>Du er klar!</h1>
      <p>{{ message }}</p>
      <a routerLink="/login" class="btn btn-primary confirm-action"> Gå til login </a>
    </div>

    <!-- Error -->
    <div *ngIf="status === 'error'" class="confirm-card">
      <div class="status-icon status-icon--error" aria-hidden="true">×</div>
      <p class="eyebrow eyebrow--error">Bekræftelse mislykkedes</p>
      <h1>Noget gik galt</h1>
      <p>{{ message }}</p>
      <a routerLink="/register" class="btn btn-primary confirm-action">
        Tilbage til registrering
      </a>
    </div>
  </main>
</div>
