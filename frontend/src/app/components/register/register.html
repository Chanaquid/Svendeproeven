<div class="min-h-screen bg-zinc-950 flex items-center justify-center px-4 py-12">

    <!-- Background grid texture -->
    <div
        class="absolute inset-0 bg-[linear-gradient(rgba(255,255,255,0.03)_1px,transparent_1px),linear-gradient(90deg,rgba(255,255,255,0.03)_1px,transparent_1px)] bg-[size:48px_48px]">
    </div>

    <!-- Glow blob -->
    <div
        class="absolute top-1/3 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-amber-500/10 rounded-full blur-3xl pointer-events-none">
    </div>

    <div class="relative w-full max-w-md">

        <!-- Logo / brand mark -->
        <div class="mb-8 text-center">
            <span class="inline-block w-10 h-10 rounded-xl bg-amber-400 mb-4"></span>
            <p class="text-zinc-400 text-sm tracking-widest uppercase font-mono">Create your account</p>
        </div>

        <!-- Card -->
        <div class="bg-zinc-900 border border-zinc-800 rounded-2xl p-8 shadow-2xl shadow-black/60">

            <h2 class="text-white text-2xl font-semibold tracking-tight mb-6">Register</h2>

            <form (ngSubmit)="register()" #registerForm="ngForm" class="space-y-5">

                <!-- Full Name + Username -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Full Name</label>
                        <input type="text" name="fullName" [(ngModel)]="dto.fullName" required placeholder="Jane Doe"
                            class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                     placeholder-zinc-600 outline-none
                     focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                     transition-all duration-200" />
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Username</label>
                        <input type="text" name="username" [(ngModel)]="dto.username" required placeholder="janedoe"
                            class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                     placeholder-zinc-600 outline-none
                     focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                     transition-all duration-200" />
                    </div>
                </div>

                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Email</label>
                    <input type="email" name="email" [(ngModel)]="dto.email" required placeholder="you@example.com"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                   placeholder-zinc-600 outline-none
                   focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                   transition-all duration-200" />
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Password</label>
                    <input type="password" name="password" [(ngModel)]="dto.password" required placeholder="••••••••"
                        class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                   placeholder-zinc-600 outline-none
                   focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                   transition-all duration-200" />
                </div>

                <!-- Date of Birth + Gender -->
                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Date of Birth</label>
                        <input type="date" name="dateOfBirth" [(ngModel)]="dto.dateOfBirth" required class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                     outline-none colorscheme-dark
                     focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                     transition-all duration-200" />
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Gender</label>
                        <select name="gender" [(ngModel)]="dto.gender" class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
                     outline-none
                     focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
                     transition-all duration-200">
                            <option value="" disabled selected class="text-zinc-600">Select</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                            <option value="PreferNotToSay">Prefer not to say</option>
                        </select>
                    </div>
                </div>

                <!-- Address -->
                <div class="space-y-1.5 relative">
                    <label class="text-zinc-400 text-xs tracking-widest uppercase font-mono">Address</label>
                    <input type="text" name="address" [(ngModel)]="dto.address" (ngModelChange)="onAddressInput($event)"
                        required autocomplete="off" placeholder="Start typing your address..." class="w-full bg-zinc-800 border border-zinc-700 text-white text-sm rounded-lg px-4 py-3
           placeholder-zinc-600 outline-none
           focus:border-amber-400 focus:ring-1 focus:ring-amber-400/30
           transition-all duration-200" />

                    <!-- Dropdown -->
                    <ul *ngIf="showSuggestions && suggestions.length"
                        class="absolute z-50 w-full mt-1 bg-zinc-800 border border-zinc-700 rounded-lg overflow-hidden shadow-xl">
                        <li *ngFor="let place of suggestions" (mousedown)="selectSuggestion(place)"
                            class="px-4 py-2.5 text-sm text-zinc-300 hover:bg-zinc-700 hover:text-white cursor-pointer truncate transition-colors duration-150">
                            {{ place.display_name }}
                        </li>
                    </ul>
                </div>

                <!-- Error message -->
                <p *ngIf="errorMessage"
                    class="text-red-400 text-xs bg-red-500/10 border border-red-500/20 rounded-lg px-3 py-2">
                    {{ errorMessage }}
                </p>

                <!-- Success message -->
                <p *ngIf="successMessage"
                    class="text-emerald-400 text-xs bg-emerald-500/10 border border-emerald-500/20 rounded-lg px-3 py-2">
                    {{ successMessage }}
                </p>

                <!-- Submit -->
                <button type="submit" [disabled]="registerForm.invalid || isLoading" class="w-full bg-amber-400 hover:bg-amber-300 disabled:bg-zinc-700 disabled:text-zinc-500
                 text-zinc-900 font-semibold text-sm rounded-lg px-4 py-3
                 transition-all duration-200 disabled:cursor-not-allowed
                 active:scale-[0.98]">
                    <span *ngIf="!isLoading">Create account</span>
                    <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
                        <svg class="animate-spin w-4 h-4" xmlns="http://www.w3.org/2000/svg" fill="none"
                            viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z" />
                        </svg>
                        Creating account...
                    </span>
                </button>

            </form>
        </div>

        <!-- Footer link -->
        <p class="text-center text-zinc-500 text-sm mt-6">
            Already have an account?
            <a routerLink="/login"
                class="text-amber-400 hover:text-amber-300 transition-colors duration-150 font-medium ml-1">
                Sign in
            </a>
        </p>

    </div>
</div>
