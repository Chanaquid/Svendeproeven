<div class="register-page">

  <!-- Background grid -->
  <div class="grid-bg"></div>

  <!-- Glow -->
  <div class="glow"></div>

  <div class="register-wrapper">

    <!-- Brand -->
    <div class="brand">
      <div class="logo">
 <img src="logo.svg" />
</div>
      <p>Create your account</p>
    </div>

    <!-- Card -->
    <div class="card">

      <h2>Register</h2>

      <form (ngSubmit)="register()" #registerForm="ngForm" class="form">

        <!-- Name + Username -->
        <div class="grid-2">
          <div class="field">
            <label>Full Name</label>
            <input type="text" name="fullName" [(ngModel)]="dto.fullName" required />
          </div>

          <div class="field">
            <label>Username</label>
            <input type="text" name="username" [(ngModel)]="dto.username" required />
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label>Email</label>
          <input type="email" name="email" [(ngModel)]="dto.email" required />
        </div>

        <!-- Password -->
        <div class="field">
          <label>Password</label>
          <input type="password" name="password" [(ngModel)]="dto.password" required />
        </div>

        <!-- Confirm Password -->
        <div class="field">
        <label>Confirm Password</label>
        <input
            type="password"
            name="confirmPassword"
            [(ngModel)]="dto.confirmPassword"
            required
        />
        </div>

        <!-- DOB + Gender -->
        <div class="grid-2">
          <div class="field">
            <label>Date of Birth</label>
            <input class="date" type="date" name="dateOfBirth" [(ngModel)]="dto.dateOfBirth" required />
          </div>

          <div class="field">
            <label>Gender</label>
            <select name="gender" [(ngModel)]="dto.gender">
              <option value="" disabled selected>Select</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
              <option value="Other">Other</option>
              <option value="PreferNotToSay">Prefer not to say</option>
            </select>
          </div>
        </div>

        <!-- Address -->
        <div class="field relative">
          <label>Address</label>

          <input
            type="text"
            name="address"
            [(ngModel)]="dto.address"
            (ngModelChange)="onAddressInput($event)"
            autocomplete="off"
            placeholder="Start typing your address..."
          />

          <ul *ngIf="showSuggestions && suggestions.length" class="suggestions">
            <li *ngFor="let place of suggestions"
                (mousedown)="selectSuggestion(place)">
              {{ place.properties.formatted }}
            </li>
          </ul>
        </div>

        <!-- Error -->
        <p *ngIf="errorMessage" class="error">
          {{ errorMessage }}
        </p>

        <!-- Success -->
        <p *ngIf="successMessage" class="success">
          {{ successMessage }}
        </p>
        <p *ngIf="dto.password && dto.confirmPassword && dto.password !== dto.confirmPassword" class="error">
            Passwords do not match
        </p>

  <!-- Avatar Upload -->
<div class="field">
  <label>Profile Picture <span class="optional">(optional)</span></label>

  <!-- Empty state: clickable to upload -->
  <div *ngIf="!avatarPreview" class="avatar-upload" (click)="avatarInput.click()">
    <div class="avatar-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
      </svg>
      <span>Upload photo</span>
      <p>PNG, JPG up to 4MB</p>
    </div>
  </div>

  <!-- Preview state: just shows image, no click handler -->
  <div *ngIf="avatarPreview" class="avatar-upload has-preview">
    <img [src]="avatarPreview" class="avatar-preview" />
  </div>

  <!-- Action buttons shown below when preview exists -->
  <div *ngIf="avatarPreview" class="avatar-actions">
<button type="button" class="change-avatar" (click)="$event.stopPropagation(); avatarInput.click()">
  ✏️ Change photo
</button>
    <button type="button" class="remove-avatar" (click)="removeAvatar()">
      ✕ Remove
    </button>
  </div>

  <input #avatarInput type="file" accept="image/*" style="display:none"
         (change)="onAvatarSelected($event)" />
</div>



        <!-- Submit -->
       <button type="submit" 
        [disabled]="registerForm.invalid || isLoading || dto.password !== dto.confirmPassword" 
        class="submit-btn">
        <span *ngIf="!isLoading">Create account</span>
        <span *ngIf="isLoading && isUploadingAvatar" class="loading">
          <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Uploading photo...
        </span>
        <span *ngIf="isLoading && !isUploadingAvatar" class="loading">
          <svg class="spinner" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
          </svg>
          Creating account...
        </span>
      </button>

      </form>
    </div>

    <!-- Footer -->
    <p class="footer">
      Already have an account?
      <a routerLink="/login">Sign in</a>
    </p>

  </div>
</div>
