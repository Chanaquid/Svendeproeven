<div class="auth-page">

  <!-- Top bar -->
  <nav class="topbar">
    <a routerLink="/" class="topbar-brand">RentIt</a>
    <div class="topbar-actions">
      <button
        type="button"
        class="theme-toggle"
        (click)="theme.toggle()"
        [attr.aria-label]="theme.theme() === 'dark' ? 'Skift til lyst tema' : 'Skift til mørkt tema'"
      >
        {{ theme.theme() === 'dark' ? '☀️' : '🌙' }}
      </button>
    </div>
  </nav>

  <!-- Register card -->
  <div class="auth-wrapper">
    <div class="auth-card">
      <h1>Opret Konto</h1>
      <p class="subtitle">Tilmeld dig RentIt og begynd at leje</p>

      <form (ngSubmit)="register()" #registerForm="ngForm" class="form">

        <!-- Name + username -->
        <div class="field-row">
          <div class="field">
            <label for="fullName">Fulde Navn</label>
            <input id="fullName" type="text" name="fullName"
              [(ngModel)]="dto.fullName" required placeholder="Anders Hansen" />
          </div>

          <div class="field">
            <label for="username">Brugernavn</label>
            <input id="username" type="text" name="username"
              [(ngModel)]="dto.username" required placeholder="anders" />
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="email">E-mail</label>
          <input id="email" type="email" name="email"
            [(ngModel)]="dto.email" required placeholder="anders@example.dk" />
        </div>

        <!-- Password -->
        <div class="field">
          <label for="password">Adgangskode</label>
          <input id="password" type="password" name="password"
            [(ngModel)]="dto.password" required placeholder="••••••••" />
        </div>

        <!-- Confirm password -->
        <div class="field">
          <label for="confirmPassword">Bekræft Adgangskode</label>
          <input id="confirmPassword" type="password" name="confirmPassword"
            [(ngModel)]="dto.confirmPassword" required placeholder="••••••••" />
        </div>

        <!-- DOB + gender -->
        <div class="field-row">
          <div class="field">
            <label for="dob">Fødselsdato</label>
            <input id="dob" type="date" name="dateOfBirth"
              [(ngModel)]="dto.dateOfBirth" required />
          </div>

          <div class="field">
            <label for="gender">Køn</label>
            <select id="gender" name="gender" [(ngModel)]="dto.gender">
              <option value="" disabled selected>Vælg</option>
              <option value="Male">Mand</option>
              <option value="Female">Kvinde</option>
              <option value="Other">Andet</option>
              <option value="PreferNotToSay">Vil ikke oplyse</option>
            </select>
          </div>
        </div>

        <!-- Address -->
        <div class="field address-field">
          <label for="address">Adresse</label>
          <input id="address" type="text" name="address"
            [(ngModel)]="dto.address" (ngModelChange)="onAddressInput($event)"
            autocomplete="off" placeholder="Begynd at skrive din adresse..." />
          <ul *ngIf="showSuggestions && suggestions.length" class="suggestions">
            <li *ngFor="let place of suggestions" (mousedown)="selectSuggestion(place)">
              {{ place.properties.formatted }}
            </li>
          </ul>
        </div>

        <!-- Avatar (optional) -->
        <div class="field">
          <label>Profilbillede <span class="optional">(valgfrit)</span></label>

          <div *ngIf="!avatarPreview" class="avatar-upload" (click)="avatarInput.click()">
            <span class="avatar-placeholder-icon">📷</span>
            <span class="avatar-placeholder-text">Upload billede</span>
            <span class="avatar-placeholder-hint">PNG, JPG op til 4MB</span>
          </div>

          <div *ngIf="avatarPreview" class="avatar-preview-wrap">
            <img [src]="avatarPreview" class="avatar-preview" alt="Avatar preview" />
            <div class="avatar-actions">
              <button type="button" class="btn-link"
                (click)="$event.stopPropagation(); avatarInput.click()">
                Skift billede
              </button>
              <button type="button" class="btn-link btn-link--danger" (click)="removeAvatar()">
                Fjern
              </button>
            </div>
          </div>

          <input #avatarInput type="file" accept="image/*" style="display:none"
            (change)="onAvatarSelected($event)" />
        </div>

        <!-- Messages -->
        <p *ngIf="errorMessage" class="form-error">{{ errorMessage }}</p>
        <p *ngIf="successMessage" class="form-success">{{ successMessage }}</p>
        <p *ngIf="dto.password && dto.confirmPassword && dto.password !== dto.confirmPassword"
          class="form-error">
          Adgangskoderne stemmer ikke overens
        </p>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary submit-btn"
          [disabled]="registerForm.invalid || isLoading || dto.password !== dto.confirmPassword">
          <span *ngIf="!isLoading">Opret Konto</span>
          <span *ngIf="isLoading && isUploadingAvatar">Uploader billede...</span>
          <span *ngIf="isLoading && !isUploadingAvatar">Opretter konto...</span>
        </button>
      </form>

      <p class="auth-footer">
        Har du allerede en konto?
        <a routerLink="/login">Log ind</a>
      </p>
    </div>
  </div>
</div>
