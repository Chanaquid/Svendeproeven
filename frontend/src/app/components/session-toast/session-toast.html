<!-- Backdrop blur overlay when toast is active -->
<div
  *ngIf="visible"
  class="fixed inset-0 z-[299] bg-black/20 backdrop-blur-[1px] pointer-events-none
         transition-opacity duration-300"
  [class.opacity-100]="visible"
  [class.opacity-0]="!visible">
</div>

<!-- Session toast -->
<div
  class="fixed bottom-6 left-1/2 -translate-x-1/2 z-[300] transition-all duration-500 ease-out"
  [class.opacity-100]="visible"
  [class.translate-y-0]="visible"
  [class.opacity-0]="!visible"
  [class.translate-y-6]="!visible"
  [class.pointer-events-none]="!visible">

  <div class="relative flex flex-col gap-3 bg-zinc-900 border border-zinc-700/80
              rounded-2xl shadow-2xl shadow-black/70 px-5 py-4 min-w-[320px] max-w-sm
              overflow-hidden">

    <!-- Animated amber glow bar at top -->
    <div class="absolute top-0 left-0 right-0 h-[2px] bg-gradient-to-r
                from-transparent via-amber-400 to-transparent
                animate-pulse"></div>

    <!-- Header row -->
    <div class="flex items-center gap-2.5">
      <!-- Pulsing clock icon -->
      <div class="w-8 h-8 rounded-xl bg-amber-400/10 border border-amber-400/20
                  flex items-center justify-center shrink-0">
        <svg class="w-4 h-4 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="flex-1 min-w-0">
        <p class="text-white text-sm font-semibold leading-tight" style="font-family:'Syne',sans-serif">
          Session expiring soon
        </p>
        <p class="text-zinc-400 text-xs leading-tight mt-0.5">
          You'll be signed out in
          <span class="text-amber-400 font-bold tabular-nums">{{ countdownLabel }}</span>
        </p>
      </div>
    </div>

    <!-- Progress bar -->
    <div class="w-full h-1 bg-zinc-800 rounded-full overflow-hidden">
      <div
        class="h-full bg-amber-400 rounded-full transition-all duration-1000 ease-linear"
        [style.width.%]="progressPct">
      </div>
    </div>

    <!-- Action buttons -->
    <div class="flex items-center gap-2">
      <button
        (click)="extend()"
        [disabled]="extending"
        class="flex-1 flex items-center justify-center gap-1.5 px-3 py-2
               bg-amber-400 hover:bg-amber-300 disabled:opacity-60
               text-zinc-900 text-xs font-bold rounded-xl
               transition-all duration-200 cursor-pointer disabled:cursor-not-allowed">
        <svg *ngIf="!extending" class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        <svg *ngIf="extending" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/>
        </svg>
        {{ extending ? 'Extending…' : 'Extend session' }}
      </button>
      <button
        (click)="dismiss()"
        class="px-3 py-2 text-xs font-semibold text-zinc-400 hover:text-white
               border border-zinc-700 hover:border-zinc-500 rounded-xl
               transition-all duration-200 cursor-pointer whitespace-nowrap">
        Sign out
      </button>
    </div>

  </div>
</div>
