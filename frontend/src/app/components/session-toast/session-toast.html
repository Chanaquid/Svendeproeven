<!-- Backdrop blur overlay when toast is active -->
<div *ngIf="visible" class="backdrop" [class.show]="visible" [class.hide]="!visible"></div>

<!-- Session toast -->
<div class="toast-container" [class.show]="visible" [class.hide]="!visible">
  <div class="toast-card">
    <!-- Animated amber glow bar -->
    <div class="top-glow"></div>

    <!-- Header -->
    <div class="header">
      <div class="icon">
        <svg
          class="icon-svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <circle cx="12" cy="12" r="10"></circle>
          <polyline points="12 6 12 12 16 14"></polyline>
        </svg>
      </div>

      <div class="text">
        <p class="title">Session expiring soon</p>
        <p class="subtitle">
          You'll be signed out in
          <span class="highlight">{{ countdownLabel }}</span>
        </p>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress">
      <div class="progress-bar" [style.width.%]="progressPct"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button (click)="extend()" [disabled]="extending" class="btn-primary">
        <svg
          *ngIf="!extending"
          class="btn-icon"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          />
        </svg>

        <svg
          *ngIf="extending"
          class="btn-icon spin"
          fill="none"
          viewBox="0 0 24 24"
          stroke="currentColor"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"
          />
        </svg>

        {{ extending ? 'Extending…' : 'Extend session' }}
      </button>

      <button (click)="dismiss()" class="btn-secondary">Sign out</button>
    </div>
  </div>
</div>
